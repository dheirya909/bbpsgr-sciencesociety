<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>pH Indicator - Science Society</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" rel="stylesheet">
    <link rel="shortcut icon" href="/logo.png" type="image/x-icon">
    <link rel="stylesheet" href="/Styles/common.css">
    <link rel="stylesheet" href="/Styles/pH.css">
</head>
<body>
    <div class="scroll-progress" id="scrollProgress"></div>
    
    <a href="/projects.html" class="back-button">
        <i class="fas fa-arrow-left"></i> Back to Projects
    </a>

    <section class="ph-section">
    <h1>pH Indicator</h1>
    
    <div class="button-container">
        <a href="/pH_Instructions.pdf" target="_blank" class="hero-button">
            <i class="fas fa-file-pdf"></i> Instructions
        </a>

        <label for="imageUpload" class="upload-label">
            <i class="fas fa-upload"></i> Upload Image
        </label>
        <input type="file" id="imageUpload" accept="image/*">
    </div>

    <div id="imagePreviewContainer" class="image-preview-container" style="display:none;">
        <div class="canvas-container">
            <canvas id="previewCanvas"></canvas>
            <div class="color-circle" id="colorCircle"></div>
        </div>
        <div class="mobile-helper">
            <i class="fas fa-hand-pointer"></i> Tap on the image to select a color
        </div>
    </div>

    <div class="input-container">
        <input id="rValue" class="input-box" type="number" placeholder="R" min="0" max="255">
        <input id="gValue" class="input-box" type="number" placeholder="G" min="0" max="255">
        <input id="bValue" class="input-box" type="number" placeholder="B" min="0" max="255">
    </div>
    
    <div class="button-container">
        <button onclick="findPH()">
            <i class="fas fa-search"></i> Find pH
        </button>
        
        <button class="outline-button" onclick="resetSelection()" id="resetBtn" style="display:none;">
            <i class="fas fa-redo"></i> Upload New Image
        </button>
    </div>
    
    <div id="result"></div>
</section>

<footer class="footer">
    <div class="footer-container">
        <div class="footer-section">
            <h3>About Us</h3>
            <p>BBPS GRH Science Society is dedicated to fostering scientific curiosity and innovation among students.</p>
        </div>

        <div class="footer-section">
            <h3>Follow Us</h3>
            <div class="social-icons">
                <a href="https://www.linkedin.com/company/science_society/" target="_blank"><i class="fab fa-linkedin"></i></a>
                <a href="https://www.instagram.com/sciencesocietybbpsgr?igsh=dDQ3OHN5YnFzMXEw&utm_source=qr" target="_blank"><i class="fab fa-instagram"></i></a>
            </div>
        </div>
    </div>
    <div class="footer-bottom">
        <p>&copy; 2025 BBPS GRH Science Society | All Rights Reserved</p>
    </div>
</footer>

<script>
let dataset = [];
const csvUrl = '/ph-data.csv';
let magnifier = null;
let selectionMade = false;

// Load CSV dataset
fetch(csvUrl)
  .then(response => {
      if (!response.ok) throw new Error("Failed to load CSV");
      return response.text();
  })
  .then(data => {
      const rows = data.trim().split('\n');
      rows.forEach((row, index) => {
          if (index === 0) return;
          const [b, g, r, pH] = row.split(',').map(v => v.trim());
          dataset.push({ pH: parseFloat(pH), r: parseInt(r), g: parseInt(g), b: parseInt(b) });
      });
  })
  .catch(error => {
      document.getElementById('result').innerText = "Error loading dataset.";
      console.error(error);
  });

// Image upload functionality
document.getElementById('imageUpload').addEventListener('change', function(e) {
    const file = e.target.files[0];
    if (!file) return;
    
    console.log('File selected:', file.name); // Debug log

    const reader = new FileReader();
    reader.onload = function(event) {
        const img = new Image();
        img.onload = function() {
            console.log('Image loaded, dimensions:', img.width, 'x', img.height); // Debug log
            
            const canvas = document.getElementById('previewCanvas');
            const ctx = canvas.getContext('2d');

            // Calculate responsive canvas size
            const maxWidth = window.innerWidth < 768 ? window.innerWidth - 80 : 500;
            const maxHeight = window.innerWidth < 768 ? 400 : 600;
            
            let width = img.width;
            let height = img.height;
            
            if (width > maxWidth) {
                height = (height * maxWidth) / width;
                width = maxWidth;
            }
            if (height > maxHeight) {
                width = (width * maxHeight) / height;
                height = maxHeight;
            }

            canvas.width = width;
            canvas.height = height;
            ctx.drawImage(img, 0, 0, width, height);

            console.log('Canvas set to:', width, 'x', height); // Debug log
            
            document.getElementById('imagePreviewContainer').style.display = "block";
            selectionMade = false;
            
            // Show reset button
            document.getElementById('resetBtn').style.display = "inline-flex";

            // Create or update magnifier
            if (magnifier && magnifier.parentNode) {
                document.body.removeChild(magnifier);
            }
            
            magnifier = document.createElement('canvas');
            magnifier.width = 120;
            magnifier.height = 120;
            magnifier.style.position = "fixed";
            magnifier.style.border = "3px solid var(--accent-color)";
            magnifier.style.borderRadius = "50%";
            magnifier.style.pointerEvents = "none";
            magnifier.style.display = "none";
            magnifier.style.zIndex = "2000";
            magnifier.style.boxShadow = "0 0 20px rgba(0, 0, 0, 0.15)";
            document.body.appendChild(magnifier);
            const mCtx = magnifier.getContext('2d');

            // Mouse/touch move → show magnifier (only if no selection yet)
            function showMagnifier(x, y, pageX, pageY) {
                if (selectionMade || !magnifier) return;
                
                const zoom = 4;
                magnifier.style.left = (pageX + 20) + "px";
                magnifier.style.top = (pageY + 20) + "px";
                magnifier.style.display = "block";

                mCtx.clearRect(0, 0, magnifier.width, magnifier.height);
                mCtx.imageSmoothingEnabled = false;
                mCtx.drawImage(
                    canvas,
                    x - magnifier.width / (2 * zoom),
                    y - magnifier.height / (2 * zoom),
                    magnifier.width / zoom,
                    magnifier.height / zoom,
                    0, 0,
                    magnifier.width,
                    magnifier.height
                );
                
                // Draw crosshair
                mCtx.strokeStyle = "var(--accent-color)";
                mCtx.lineWidth = 2;
                mCtx.beginPath();
                mCtx.moveTo(magnifier.width/2 - 10, magnifier.height/2);
                mCtx.lineTo(magnifier.width/2 + 10, magnifier.height/2);
                mCtx.moveTo(magnifier.width/2, magnifier.height/2 - 10);
                mCtx.lineTo(magnifier.width/2, magnifier.height/2 + 10);
                mCtx.stroke();
            }

            // Mouse events for desktop
            canvas.addEventListener('mousemove', function(event) {
                const rect = canvas.getBoundingClientRect();
                const x = event.clientX - rect.left;
                const y = event.clientY - rect.top;
                showMagnifier(x, y, event.pageX, event.pageY);
            });

            // Touch events for mobile
            canvas.addEventListener('touchmove', function(event) {
                event.preventDefault();
                const rect = canvas.getBoundingClientRect();
                const touch = event.touches[0];
                const x = touch.clientX - rect.left;
                const y = touch.clientY - rect.top;
                showMagnifier(x, y, touch.pageX, touch.pageY);
            }, { passive: false });

            // Hide magnifier when leaving
            canvas.addEventListener('mouseleave', function() {
                if (!selectionMade && magnifier) {
                    magnifier.style.display = "none";
                }
            });

            canvas.addEventListener('touchend', function() {
                setTimeout(() => {
                    if (!selectionMade && magnifier) {
                        magnifier.style.display = "none";
                    }
                }, 100);
            });

            // Click/Touch → pick pixel color
            function selectColor(x, y) {
                if (selectionMade) return;

                const pixel = ctx.getImageData(Math.floor(x), Math.floor(y), 1, 1).data;

                document.getElementById('rValue').value = pixel[0];
                document.getElementById('gValue').value = pixel[1];
                document.getElementById('bValue').value = pixel[2];

                document.getElementById('result').innerHTML = `
                    <i class="fas fa-palette"></i> Selected RGB: R=${pixel[0]}, G=${pixel[1]}, B=${pixel[2]}
                `;

                // Show color circle at selection point
                const colorCircle = document.getElementById('colorCircle');
                colorCircle.style.left = x + 'px';
                colorCircle.style.top = y + 'px';
                colorCircle.style.display = 'block';

                // Hide magnifier and image after selection
                if (magnifier) {
                    magnifier.style.display = "none";
                }
                
                // Hide the image preview after a short delay
                setTimeout(() => {
                    document.getElementById('imagePreviewContainer').style.display = "none";
                }, 2000);
                
                selectionMade = true;
            }

            // Click event
            canvas.addEventListener('click', function(event) {
                const rect = canvas.getBoundingClientRect();
                const x = event.clientX - rect.left;
                const y = event.clientY - rect.top;
                selectColor(x, y);
            });

            // Touch event
            canvas.addEventListener('touchstart', function(event) {
                event.preventDefault();
                const rect = canvas.getBoundingClientRect();
                const touch = event.touches[0];
                const x = touch.clientX - rect.left;
                const y = touch.clientY - rect.top;
                selectColor(x, y);
            }, { passive: false });
        };
        
        img.onerror = function() {
            console.error('Failed to load image');
            document.getElementById('result').innerHTML = `
                <i class="fas fa-exclamation-triangle"></i> Failed to load image. Please try again.
            `;
        };
        
        img.src = event.target.result;
    };
    
    reader.onerror = function() {
        console.error('Failed to read file');
        document.getElementById('result').innerHTML = `
            <i class="fas fa-exclamation-triangle"></i> Failed to read file. Please try again.
        `;
    };
    
    reader.readAsDataURL(file);
});

// Reset selection function
function resetSelection() {
    selectionMade = false;
    document.getElementById('imagePreviewContainer').style.display = "none";
    document.getElementById('colorCircle').style.display = "none";
    document.getElementById('resetBtn').style.display = "none";
    document.getElementById('rValue').value = "";
    document.getElementById('gValue').value = "";
    document.getElementById('bValue').value = "";
    document.getElementById('result').innerText = "";
    document.getElementById('imageUpload').value = "";
    
    if (magnifier) {
        document.body.removeChild(magnifier);
        magnifier = null;
    }
}

// pH Finder
function findPH() {
    const r = parseInt(document.getElementById('rValue').value);
    const g = parseInt(document.getElementById('gValue').value);
    const b = parseInt(document.getElementById('bValue').value);
    
    if (isNaN(r) || isNaN(g) || isNaN(b)) {
        document.getElementById('result').innerHTML = `
            <i class="fas fa-exclamation-triangle"></i> Please enter all RGB values or select a color from an image.
        `;
        return;
    }
    
    if (r < 0 || r > 255 || g < 0 || g > 255 || b < 0 || b > 255) {
        document.getElementById('result').innerHTML = `
            <i class="fas fa-exclamation-triangle"></i> RGB values must be between 0 and 255.
        `;
        return;
    }
    
    let closest = null, minDist = Infinity;
    dataset.forEach(item => {
        const dist = Math.sqrt(Math.pow(item.r - r, 2) + Math.pow(item.g - g, 2) + Math.pow(item.b - b, 2));
        if (dist < minDist) { 
            minDist = dist; 
            closest = item; 
        }
    });
    
    if (closest) {
        let phCategory = "";
        if (closest.pH < 7) {
            phCategory = "Acidic";
        } else if (closest.pH > 7) {
            phCategory = "Basic";
        } else {
            phCategory = "Neutral";
        }
        
        document.getElementById('result').innerHTML = `
            <i class="fas fa-flask"></i> <strong>Estimated pH: ${closest.pH}</strong><br>
            <small>Classification: ${phCategory} | RGB: (${r}, ${g}, ${b})</small>
        `;
    } else {
        document.getElementById('result').innerHTML = `
            <i class="fas fa-times-circle"></i> No match found in dataset.
        `;
    }
}

window.addEventListener('scroll', () => {
    const scrollProgress = document.getElementById('scrollProgress');
    const totalHeight = document.documentElement.scrollHeight - window.innerHeight;
    const progress = (window.pageYOffset / totalHeight) * 100;
    scrollProgress.style.transform = `scaleX(${progress / 100})`;
});

// Cleanup magnifier on page unload
window.addEventListener('beforeunload', () => {
    if (magnifier && magnifier.parentNode) {
        document.body.removeChild(magnifier);
    }
});
</script>

</body>
</html>
